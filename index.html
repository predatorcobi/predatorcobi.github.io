<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predatoracobi</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 28px;
        }

        p {
            margin-bottom: 30px;
            color: #ccc;
        }

        .btn {
            display: block;
            margin: 12px 0;
            padding: 14px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
            background: linear-gradient(135deg, #ff4c4c, #ff7b7b);
            color: white;
        }

        .btn:nth-child(2) {
            background: linear-gradient(135deg, #4caf50, #7cff7c);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vítej na stránce predatoracobiho</h1>
        <p>Co hledáš?</p>

        <a class="btn" href="/CobiMadarskaBestie">CobiMadarskaBestie</a>
        <a class="btn" href="/GameOfLife">Game of Life</a>
    </div>
</body>
</html>
